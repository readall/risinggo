version: '3.8'

services:
  risingwave:
    image: risingwavelabs/risingwave:latest
    command: playground
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "4566", "-U", "root"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-server:
    # Use your built Go image or the reference (update as needed)
    image: risingwavelabs/risingwave-mcp-server:latest
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_PORT: 8000
      RISINGWAVE_CONNECTION_STR: "postgresql://root:root@risingwave:4566/dev"
    ports:
      - "8000:8000"
    depends_on:
      risingwave:
        condition: service_healthy

  # k6 is usually run from host or a separate container
  # Example: docker compose run k6 run /scripts/mcp-loadtest.js